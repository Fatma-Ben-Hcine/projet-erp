  <main class="main-content" style="background: transparent !important;">
    <div class="rh-dashboard-container">
      <div class="page-header">
        <div class="header-text">
          <h1 class="page-title">Dashboard RH</h1>
          <p class="page-subtitle">
            Analyse et statistiques des ressources humaines
          </p>

      </div>

      <div class="powerbi-wrapper">

          <iframe

            frameborder="0" 
            allowFullScreen="true">
          </iframe>
        </div>
      </div>
    </div>
  </main>
