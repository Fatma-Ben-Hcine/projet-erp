<div class="layout" style="position: relative; z-index: 1;">
  <!-- Hexagon background pattern -->
  <div style="position: fixed; inset: 0; opacity: 0.1;
            pointer-events: none; z-index: 0; color: #92400e;">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hexagons-admin" x="0" y="0"
               width="100" height="87" patternUnits="userSpaceOnUse">
          <polygon points="50,0 93.3,25 93.3,62 50,87 6.7,62 6.7,25"
                 fill="none" stroke="currentColor" stroke-width="0.8" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hexagons-admin)" />
    </svg>
  </div>

  <app-admin-sidebar></app-admin-sidebar>

  <main class="main-content" style="background: transparent !important;">
    <!-- Le composant ressources-list sera intégré ici -->
    <app-ressources-list></app-ressources-list>
  </main>
</div>
