<div class="layout" style="position: relative; z-index: 1;">
  <!-- Hexagon background pattern -->
  <div style="position: fixed; inset: 0; opacity: 0.1;
            pointer-events: none; z-index: 0; color: #92400e;">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hexagons-admin" x="0" y="0"
               width="100" height="87" patternUnits="userSpaceOnUse">
          <polygon points="50,0 93.3,25 93.3,62 50,87 6.7,62 6.7,25"
                 fill="none" stroke="currentColor" stroke-width="0.8" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hexagons-admin)" />
    </svg>
  </div>
  <app-admin-sidebar></app-admin-sidebar>
  <main class="main-content" style="background: transparent !important;">
    <div class="page-header">
      <h1 class="page-title">Tableau de Bord</h1>
      <p class="page-subtitle">Vue d'ensemble de votre système ERP</p>
    </div>

    <!-- Loading -->
    <div class="kpi-loading" *ngIf="isLoadingStats">
      <div class="spinner"></div>
    </div>

    <div *ngIf="!isLoadingStats">

      <!-- Projets -->
      <section class="section">
        <h2 class="section-title">📊 Projets</h2>
        <div class="stats-grid stats-grid-5">
          <app-stat-card
            title="Total Projets"
            [value]="stats.totalProjets"
            icon="folder_special"
            color="primary">
          </app-stat-card>
          <app-stat-card
            title="Terminé"
            [value]="stats.termine"
            icon="check_circle"
            color="success">
          </app-stat-card>
          <app-stat-card
            title="Retard"
            [value]="stats.retard"
            icon="error"
            color="danger">
          </app-stat-card>
          <app-stat-card
            title="Total Activités"
            [value]="stats.totalActivites"
            icon="task_alt"
            color="info">
          </app-stat-card>
          <app-stat-card
            title="Total Tâches"
            [value]="stats.totalTaches"
            icon="checklist"
            color="warning">
          </app-stat-card>
        </div>
      </section>

      <!-- Employés -->
      <section class="section">
        <h2 class="section-title">👥 Employés</h2>
        <div class="stats-grid stats-grid-4">
          <app-stat-card
            title="Total Utilisateurs Permanents"
            [value]="stats.totalUtilisateursPermanents"
            icon="verified_user"
            color="success">
          </app-stat-card>
          <app-stat-card
            title="Total Employés"
            [value]="stats.totalEmployes"
            icon="group"
            color="primary">
          </app-stat-card>
          <app-stat-card
            title="Total Administrateurs"
            [value]="stats.totalAdministrateurs"
            icon="admin_panel_settings"
            color="info">
          </app-stat-card>
          <app-stat-card
            title="Total Utilisateurs Temporaires"
            [value]="stats.totalUtilisateursTemporaires"
            icon="schedule"
            color="warning">
          </app-stat-card>
        </div>
      </section>

    </div>
  </main>
</div>
