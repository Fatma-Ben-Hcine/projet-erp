<div class="layout" style="position: relative; z-index: 1;">
  <!-- Hexagon background pattern -->
  <div style="position: fixed; inset: 0; opacity: 0.1;
            pointer-events: none; z-index: 0; color: #92400e;">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hexagons-admin" x="0" y="0"
               width="100" height="87" patternUnits="userSpaceOnUse">
          <polygon points="50,0 93.3,25 93.3,62 50,87 6.7,62 6.7,25"
                 fill="none" stroke="currentColor" stroke-width="0.8" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hexagons-admin)" />
    </svg>
  </div>

  <app-admin-sidebar></app-admin-sidebar>

  <main class="main-content" style="background: transparent !important;">
    <div class="page-header">
      <h1 class="page-title">Tableau de Bord</h1>
      <p class="page-subtitle">Vue d'ensemble de votre système ERP</p>
    </div>

    <!-- Projets -->
    <section class="section">
      <h2 class="section-title">📊 Projets</h2>
      <div class="stats-grid stats-grid-3">
        <app-stat-card
          title="Total Projets"
          [value]="totalProjects"
          icon="folder_special"
          color="primary">
        </app-stat-card>
        <app-stat-card
          title="Projets Terminés"
          [value]="completedProjects"
          icon="check_circle"
          color="success">
        </app-stat-card>
        <app-stat-card
          title="Projets en Retard"
          [value]="lateProjects"
          icon="error"
          color="danger">
        </app-stat-card>
      </div>
    </section>

    <!-- Tickets -->
    <section class="section">
      <h2 class="section-title">🎟️ Tickets</h2>
      <div class="stats-grid stats-grid-3">
        <app-stat-card
          title="Total Tickets"
          [value]="totalTickets"
          icon="confirmation_number"
          color="primary">
        </app-stat-card>
        <app-stat-card
          title="Tickets Terminés"
          [value]="completedTickets"
          icon="check_circle"
          color="success">
        </app-stat-card>
        <app-stat-card
          title="Tickets en Retard"
          [value]="lateTickets"
          icon="error"
          color="danger">
        </app-stat-card>
      </div>
    </section>

    <!-- Employés -->
    <section class="section">
      <h2 class="section-title">👥 Employés</h2>
      <div class="stats-grid stats-grid-4">
        <app-stat-card
          title="Nouveaux Employés"
          [value]="newEmployees"
          icon="group_add"
          color="info">
        </app-stat-card>
        <app-stat-card
          title="Employés Permanents"
          [value]="permanentEmployees"
          icon="verified_user"
          color="success">
        </app-stat-card>
        <app-stat-card
          title="Employés Temporaires"
          [value]="temporaryEmployees"
          icon="schedule"
          color="warning">
        </app-stat-card>
        <app-stat-card
          title="Administrateurs"
          [value]="admins"
          icon="admin_panel_settings"
          color="primary">
        </app-stat-card>
      </div>
    </section>
  </main>
</div>
