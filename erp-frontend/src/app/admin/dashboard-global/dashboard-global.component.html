<div class="layout" style="position: relative; z-index: 1;">
  <app-admin-sidebar></app-admin-sidebar>

  <main class="main-content" style="background: transparent !important;">
    <div class="dashboard-container">
      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">
          Vue globale de tous les rapports Power BI
        </p>
      </div>

      <div class="dashboard-controls" style="margin-bottom:12px; display:flex; gap:8px; align-items:center;">
        <button class="btn" (click)="manualRefresh()">Actualiser</button>
        <button class="btn" (click)="toggleAutoRefresh()">{{ autoRefresh ? 'Pause auto' : 'Activer auto' }}</button>
        <span style="font-size:12px; color:#6b7280;">Auto: {{ autoRefresh ? 'ON' : 'OFF' }}</span>
      </div>

      <div class="powerbi-wrapper">
        <div class="powerbi-container">
          <iframe
            title="Dashboard Global"
            [src]="powerBiUrl"
            frameborder="0"
            allowFullScreen="true">
          </iframe>
        </div>
      </div>
    </div>
  </main>
</div>
