<div class="layout" style="position: relative; z-index: 1;">
  <app-admin-sidebar></app-admin-sidebar>

  <main class="main-content" style="background: transparent !important;">
    <div class="dashboard-container">
      <!-- Page Header -->
      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Vue globale de tous les rapports Power BI</p>
      </div>

      <!-- Simple Controls -->
      <div class="dashboard-controls" style="margin-bottom: 16px; display: flex; gap: 12px; align-items: center; padding: 12px; background: #f3f4f6; border-radius: 8px;">
        <!-- Manual Refresh Button -->
        <button
          class="btn btn-primary"
          (click)="manualRefresh()"
          [disabled]="isRefreshing"
          style="padding: 8px 16px; border-radius: 6px; cursor: pointer;">
          {{ isRefreshing ? '⟳ Actualisation...' : '🔄 Actualiser' }}
        </button>

        <!-- Last Refresh Time -->
        <span *ngIf="lastRefreshTime" style="margin-left: auto; font-size: 13px; color: #6b7280;">
          Dernier: {{ lastRefreshTime | date:'HH:mm:ss' }}
        </span>
      </div>

      <!-- Power BI IFrame -->
      <div class="powerbi-wrapper">
        <div class="powerbi-container">
          <iframe
            #powerBiIframe
            title="Dashboard Global"
            [src]="reportUrl"
            frameborder="0"
            allowFullScreen="true"
            style="width: 100%; height: 100%; border: none;">
          </iframe>
        </div>
      </div>
    </div>
  </main>
</div>
