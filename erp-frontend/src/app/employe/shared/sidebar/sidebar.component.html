<aside class="sidebar">
  <div class="sidebar-header">
    <h2 class="sidebar-title">ERP System</h2>
    <p class="sidebar-subtitle">Employé</p>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/employe/dashboard" routerLinkActive="active" class="nav-item">
      <span class="material-icons">home</span>
      Accueil
    </a>
    <a routerLink="/employe/ressources" routerLinkActive="active" class="nav-item">
      <span class="material-icons">inventory_2</span>
      Ressources
    </a>
    <a routerLink="/employe/tickets" routerLinkActive="active" class="nav-item">
      <span class="material-icons">confirmation_number</span>
      Tickets
    </a>
    <a routerLink="/employe/conges" routerLinkActive="active" class="nav-item">
      <span class="material-icons">event_available</span>
      Congés
    </a>
    <a routerLink="/employe/profile" routerLinkActive="active" class="nav-item">
      <span class="material-icons">person</span>
      Profile
    </a>
  </nav>

  <div class="sidebar-footer">
    <button class="nav-item dark-toggle" (click)="toggleDarkMode()">
      <span class="material-icons">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
      {{ isDarkMode ? 'Mode Clair' : 'Mode Sombre' }}
    </button>
    <button class="nav-item logout-btn" (click)="logout()">
      <span class="material-icons">logout</span>
      Déconnexion
    </button>
  </div>
</aside>
