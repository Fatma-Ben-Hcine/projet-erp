<div class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-toggle" (click)="toggleSidebar()">
    <span class="material-icons">{{ isCollapsed ? 'menu' : 'close' }}</span>
  </div>

  <div class="sidebar-brand">
    <span class="brand-title">ERP System</span>
    <span class="brand-role">Employé</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item" routerLink="/employe/dashboard" routerLinkActive="active" title="Accueil">
      <span class="material-icons nav-icon">home</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a class="nav-item" routerLink="/employe/ressources/demande" routerLinkActive="active" title="Ressources">
      <span class="material-icons nav-icon">inventory_2</span>
      <span class="nav-label">Ressources</span>
    </a>
    <a class="nav-item" routerLink="/employe/conges" routerLinkActive="active" title="Congés">
      <span class="material-icons nav-icon">event_available</span>
      <span class="nav-label">Congés</span>
    </a>
    <a class="nav-item" routerLink="/employe/profile" routerLinkActive="active" title="Profile">
      <span class="material-icons nav-icon">person</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="nav-item" (click)="toggleDarkMode()" title="Mode">
      <span class="material-icons nav-icon">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
      <span class="nav-label">{{ isDarkMode ? 'Mode Clair' : 'Mode Sombre' }}</span>
    </div>
    <div class="nav-item" (click)="logout()" title="Déconnexion">
      <span class="material-icons nav-icon">logout</span>
      <span class="nav-label">Déconnexion</span>
    </div>
  </div>
</div>
