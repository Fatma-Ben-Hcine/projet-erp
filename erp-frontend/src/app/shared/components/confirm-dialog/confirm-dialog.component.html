<div *ngIf="isVisible" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
    <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ data.title }}</h3>
    <p class="text-gray-600 mb-6">{{ data.message }}</p>
    <div class="flex justify-end space-x-3">
      <button
        (click)="onCancel()"
        class="px-4 py-2 text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors"
      >
        {{ data.cancelText }}
      </button>
      <button
        (click)="onConfirm()"
        class="px-4 py-2 text-white bg-red-600 rounded-md hover:bg-red-700 transition-colors"
      >
        {{ data.confirmText }}
      </button>
    </div>
  </div>
</div>
