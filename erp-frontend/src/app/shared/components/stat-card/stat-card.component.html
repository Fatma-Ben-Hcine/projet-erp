<div class="stat-card">
  <div class="stat-card-content">
    <div class="stat-card-text">
      <p class="stat-card-title">{{ title }}</p>
      <p class="stat-card-value">{{ value }}</p>
    </div>
    <div class="stat-card-icon" [ngClass]="'icon-' + color">
      <span class="material-icons">{{ icon }}</span>
    </div>
  </div>
</div>
