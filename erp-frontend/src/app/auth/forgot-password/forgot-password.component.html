<div class="min-h-screen flex items-center justify-center p-4"
     style="position: relative; z-index: 1;">

  <div class="w-full max-w-md relative z-10">
    <div class="bg-white dark:bg-gray-900 rounded-[16px] shadow-xl p-8
                border border-gray-100 dark:border-gray-800">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16
                    bg-[#FFF1C1] dark:bg-yellow-900 rounded-full mb-4">
          <span class="material-icons text-gray-900 dark:text-yellow-100"
                style="font-size: 32px;">lock_reset</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">
          Mot de passe oublié
        </h1>
        <p class="text-gray-600 dark:text-gray-400">
          Entrez votre email pour recevoir un lien de réinitialisation
        </p>
      </div>

      <!-- Form -->
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Email field -->
        <div>
          <label class="block text-sm font-medium text-gray-700
                        dark:text-gray-300 mb-2">
            Email
          </label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="votre@email.com"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300
                   dark:border-gray-700 bg-white dark:bg-gray-800
                   text-gray-900 dark:text-white
                   focus:ring-2 focus:ring-[#FFF1C1] dark:focus:ring-yellow-900
                   focus:border-transparent outline-none transition-all" />
          <small
            *ngIf="forgotForm.get('email')?.invalid &&
                   forgotForm.get('email')?.touched"
            class="text-red-500 text-xs mt-1 block">
            Email invalide
          </small>
        </div>

        <!-- Success message -->
        <div *ngIf="successMessage"
             class="bg-green-50 dark:bg-green-900/20 text-green-700
                    dark:text-green-400 p-3 rounded-lg text-sm
                    border border-green-200 dark:border-green-800">
          {{ successMessage }}
        </div>

        <!-- Error message -->
        <div *ngIf="errorMessage"
             class="bg-red-50 dark:bg-red-900/20 text-red-600
                    dark:text-red-400 p-3 rounded-lg text-sm
                    border border-red-200 dark:border-red-800">
          {{ errorMessage }}
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          [disabled]="forgotForm.invalid || isLoading || formDisabled"
          class="w-full bg-gray-900 dark:bg-white text-white dark:text-gray-900
                 py-3 rounded-lg font-medium hover:bg-gray-800
                 dark:hover:bg-gray-100 transition-colors shadow-md
                 disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isLoading ? 'Envoi en cours...' : 'Envoyer le lien' }}
        </button>

      </form>

      <!-- Back to login -->
      <div class="text-center mt-6">
        <a (click)="goToLogin()"
           class="text-sm text-gray-500 dark:text-gray-400
                  hover:text-gray-900 dark:hover:text-white
                  transition-colors cursor-pointer
                  inline-flex items-center gap-1">
          <span class="material-icons" style="font-size: 16px;">arrow_back</span>
          Retour à la connexion
        </a>
      </div>

    </div>
  </div>
</div>
